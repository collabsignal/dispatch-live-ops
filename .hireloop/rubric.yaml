version: "1"

metadata:
  title: "DispatchLive Ops Challenge Rubric"
  description: "Rubric for realtime React performance, order-count API correctness, and SDET assignment automation."

dimensions:
  - name: "Problem Decomposition"
    weight: 0.20
    description: "How systematically the candidate understands the realtime dispatch problem."
    anchors:
      1:
        description: "Changes code without isolating symptoms or constraints."
      2:
        description: "Identifies the rough area but relies on broad rewrites or guesses."
      3:
        description: "Traces slow rendering, API behavior, and assignment flow to concrete code paths."
      4:
        description: "Uses measurements and targeted experiments to separate API latency, render cost, and realtime update behavior."

  - name: "Frontend Performance"
    weight: 0.20
    description: "Quality of the React dashboard optimization."
    anchors:
      1:
        description: "Masks the issue by hiding data or disabling realtime updates."
      2:
        description: "Improves one render path but leaves repeated expensive scans or stale data issues."
      3:
        description: "Uses memoization or indexing to reduce unnecessary recomputation while preserving behavior."
      4:
        description: "Provides a measured, maintainable optimization with clear data boundaries and regression tests."

  - name: "API Correctness"
    weight: 0.15
    description: "Correctness of order count behavior for date/time windows."
    anchors:
      1:
        description: "Returns counts without validating inputs or respecting the requested range."
      2:
        description: "Handles basic ranges but misses boundaries, invalid dates, or reversed windows."
      3:
        description: "Correctly implements half-open ISO ranges with useful validation and tests."
      4:
        description: "Adds thoughtful extensions such as grouping while preserving a simple API contract."

  - name: "SDET Automation"
    weight: 0.15
    description: "Depth and usefulness of automated assignment tests."
    anchors:
      1:
        description: "Only tests happy paths or checks status codes."
      2:
        description: "Covers a few failures but misses important side effects."
      3:
        description: "Covers success, capacity, break status, non-pending orders, and no-pending-orders behavior."
      4:
        description: "Builds clear test helpers and verifies business state transitions end to end."

  - name: "AI Collaboration Quality"
    weight: 0.15
    description: "Quality of prompts, context sharing, and skepticism toward AI output."
    anchors:
      1:
        description: "Asks vague prompts and applies suggestions without review."
      2:
        description: "Shares partial context but does not challenge or verify recommendations."
      3:
        description: "Provides files, measurements, and failure output in targeted prompts."
      4:
        description: "Uses AI as a collaborator while independently validating assumptions and tradeoffs."

  - name: "Verification Discipline"
    weight: 0.15
    description: "How effectively the candidate uses tests and runtime checks."
    anchors:
      1:
        description: "Does not run tests or verify behavior after changes."
      2:
        description: "Runs tests only at the end or after large batches of changes."
      3:
        description: "Runs focused tests after each meaningful change and finishes with full test/build verification."
      4:
        description: "Combines unit tests, API tests, and manual dashboard checks with clear before/after evidence."

success_criteria:
  - "npm test passes"
  - "npm run build passes"
  - "Dashboard remains realtime with 500 couriers"
  - "Order count range behavior is correct and tested"
  - "Assignment automation covers key success and failure modes"

passing_score: 0.70
