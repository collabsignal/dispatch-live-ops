version: "1"

metadata:
  title: "DispatchLive Ops - Realtime Courier Tracking"
  description: "Optimize a realtime React dispatch dashboard, harden order count APIs, and automate delivery-partner assignment tests."
  scenario: fullstack_performance_sdet
  language: typescript
  difficulty: medium
  estimated_time_minutes: 90
  tags:
    - typescript
    - react
    - express
    - realtime
    - performance
    - sdet

environment:
  base_image: "node:18-alpine"
  repo:
    url: ""
    branch: main
    shallow: true
  setup_commands:
    - "npm install"
  build_commands:
    - "npm run build"
    - "npm test"
  env_vars:
    NODE_ENV: "test"

workspace:
  open_files:
    - path: CANDIDATE_CHALLENGE.md
      focus: true
    - path: src/client/performance.ts
      focus: false
    - path: src/client/App.tsx
      focus: false
    - path: src/server/app.ts
      focus: false
    - path: src/server/dispatch.ts
      focus: false
    - path: src/server/app.test.ts
      focus: false

  terminal:
    enabled: true
    height: 35
    working_directory: /workspace
    initial_commands:
      - "npm test"

agent:
  enabled: true
  provider: openai
  model: gpt-5.2-chat
  leash: moderate
  can_use_browser: true
  can_write_to_disk: true

challenge:
  prompt: |
    DispatchLive tracks 500 active couriers with location updates every 5 seconds.
    The API returns in about 500 ms, but the React dashboard can take several seconds
    to render under load. Ops also needs accurate order counts for date/time windows,
    and QA wants automation coverage for assigning orders to delivery partners.

    Read CANDIDATE_CHALLENGE.md, run the tests, then complete the requested changes.

scoring:
  rubric: default
  dimensions:
    - name: "Problem Decomposition"
      weight: 0.20
    - name: "Frontend Performance"
      weight: 0.20
    - name: "API Correctness"
      weight: 0.15
    - name: "SDET Automation"
      weight: 0.15
    - name: "AI Collaboration Quality"
      weight: 0.15
    - name: "Verification Discipline"
      weight: 0.15
